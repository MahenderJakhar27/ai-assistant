<!DOCTYPE html>
<html>
<head>
    <title>AI Terminal</title>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            margin: 0;
        }

        header {
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            text-align: center;
        }

        .terminal {
            padding: 15px;
            height: 80vh;
            overflow-y: auto;
        }

        .line {
            margin: 5px 0;
        }

        .user {
            color: #00ffff;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #00ff00;
        }

        input {
            flex: 1;
            background: black;
            color: #00ff00;
            border: none;
            padding: 10px;
            font-family: monospace;
            outline: none;
        }

        button {
            background: black;
            color: #00ff00;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #003300;
        }
    </style>
</head>

<body>

<header>AI TERMINAL v1.0</header>

<div class="terminal" id="terminal"></div>

<div class="input-box">
    <input id="input" placeholder="type command..." onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">ENTER</button>
    <button onclick="startListening()">🎤</button>
</div>

<script>
let selectedVoice = null;

// ✅ Load voices properly
window.speechSynthesis.onvoiceschanged = () => {
    const voices = speechSynthesis.getVoices();

    console.log("Available voices:", voices.map(v => v.name));

    // 🔥 Try to pick best voice automatically
    selectedVoice =
        voices.find(v => v.name.includes("Google UK English")) ||
        voices.find(v => v.name.includes("Google US English")) ||
        voices.find(v => v.name.includes("Microsoft")) ||
        voices.find(v => v.name.includes("Google हिन्दी")) ||
        voices[0];
};


// ✨ Typing effect
async function typeEffect(text, container) {
    let i = 0;
    let line = document.createElement("div");
    line.className = "line";
    container.appendChild(line);

    let interval = setInterval(() => {
        line.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 20);
}


// 🚀 Send message
async function send() {
    let input = document.getElementById("input").value;
    let terminal = document.getElementById("terminal");

    if (!input.trim()) return;

    terminal.innerHTML += `<div class="line user">> ${input}</div>`;

    let res = await fetch(`/chat/?user_input=${input}`, {
        method: "POST"
    });

    let data = await res.json();

    await typeEffect(data.response, terminal);

    speak(data.response); // 🔊 voice

    terminal.scrollTop = terminal.scrollHeight;
    document.getElementById("input").value = "";
}


// 🎤 Voice Input
function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-US";

    recognition.onresult = (event) => {
        let text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
        send();
    };

    recognition.onerror = (err) => {
        console.error(err);
    };

    recognition.start();
}


// 🔊 Voice Output (UPGRADED)
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);

    speech.voice = selectedVoice;
    speech.rate = 0.9;   // 🧠 natural speed
    speech.pitch = 0.8;  // 🤖 deeper tone
    speech.lang = "en-GB";

    speechSynthesis.speak(speech);
}
</script>

</body>
</html>
