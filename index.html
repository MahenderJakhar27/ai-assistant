<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>
        body {
            background: #0f172a;
            color: #00ff9f;
            font-family: "Courier New", monospace;
            margin: 0;
        }

        header {
            padding: 15px;
            background: #020617;
            text-align: center;
            font-size: 20px;
            border-bottom: 2px solid #00ff9f;
        }

        .container {
            display: flex;
            height: 80vh;
        }

        .chat, .tasks {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .chat {
            border-right: 1px solid #00ff9f;
        }

        .message {
            margin-bottom: 10px;
        }

        .user {
            color: #38bdf8;
        }

        .bot {
            color: #00ff9f;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 10px;
            background: black;
            color: #00ff9f;
            border: 1px solid #00ff9f;
        }

        button {
            padding: 10px;
            background: #00ff9f;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>🤖 AI Assistant Dashboard</header>

<div class="container">
    <div class="chat" id="chat"></div>
    <div class="tasks" id="tasks">
        <h3>Tasks</h3>
    </div>
</div>

<div class="input-box">
    <input id="input" placeholder="Type command..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input").value;

    let chatDiv = document.getElementById("chat");

    chatDiv.innerHTML += `<div class="message user">You: ${input}</div>`;

    let res = await fetch(`http://127.0.0.1:8000/chat/?user_input=${input}`, {
        method: "POST"
    });

    let data = await res.json();

    chatDiv.innerHTML += `<div class="message bot">AI: ${data.response}</div>`;

    // Update tasks panel
    if (input.includes("show tasks")) {
        document.getElementById("tasks").innerHTML =
            "<h3>Tasks</h3>" + data.response.replace(/\n/g, "<br>");
    }

    document.getElementById("input").value = "";
}
</script>

</body>
</html>
